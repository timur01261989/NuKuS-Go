name        = "unigo-edge"
main        = "surge-worker.js"
compatibility_date = "2024-01-01"
workers_dev = false

[[kv_namespaces]]
binding  = "SURGE_KV"
id       = "your-kv-namespace-id"

[env.production]
routes = [
  { pattern = "api.unigo.uz/edge/*", zone_name = "unigo.uz" }
]

[env.staging]
routes = [
  { pattern = "staging.unigo.uz/edge/*", zone_name = "unigo.uz" }
]
