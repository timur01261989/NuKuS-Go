apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    version: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: stable
    spec:
      containers:
      - name: api-gateway
        image: ghcr.io/unigo/api-gateway:latest
        ports:
        - containerPort: 8080
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits:   { cpu: "500m", memory: "512Mi" }
        envFrom:
        - configMapRef:
            name: unigo-config
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: unigo-secrets
              key: jwt-secret
        livenessProbe:
          httpGet: { path: /api/health, port: 8080 }
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet: { path: /api/health, port: 8080 }
          initialDelaySeconds: 5
          periodSeconds: 10
---
