apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-gateway-vs
  namespace: unigo-prod
spec:
  hosts: ["api.unigo.uz"]
  http:
  - match:
    - headers:
        x-canary:
          exact: "true"
    route:
    - destination:
        host: api-gateway
        subset: canary
      weight: 100
  - route:
    - destination:
        host: api-gateway
        subset: stable
      weight: 95
    - destination:
        host: api-gateway
        subset: canary
      weight: 5
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: api-gateway-dr
  namespace: unigo-prod
spec:
  host: api-gateway
  trafficPolicy:
    connectionPool:
      tcp: { maxConnections: 1000 }
      http:
        h2UpgradePolicy: UPGRADE
        http2MaxRequests: 1000
        http1MaxPendingRequests: 100
        maxRequestsPerConnection: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
  - name: stable
    labels: { version: stable }
  - name: canary
    labels: { version: canary }
