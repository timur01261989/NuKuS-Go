version: "3.9"

# ═══════════════════════════════════════════════════════════════════
# UniGo Platform — Docker Compose (to'liq stack)
# Jami: 22 servis
# ═══════════════════════════════════════════════════════════════════

services:

  # ── Infrastructure ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB:       ${DB_NAME:-unigo}
      POSTGRES_USER:     ${DB_USER:-unigo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-unigo}"]
      interval: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports: ["9092:9092"]
    depends_on:
      zookeeper: { condition: service_healthy }
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR:       1
      KAFKA_NUM_PARTITIONS:                   12
      KAFKA_LOG_RETENTION_HOURS:              168
      KAFKA_COMPRESSION_TYPE:                 lz4
      KAFKA_MESSAGE_MAX_BYTES:                10485760
    volumes: [kafka-data:/var/lib/kafka/data]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB:       unigo
      CLICKHOUSE_USER:     default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./db/clickhouse/config.xml:/etc/clickhouse-server/config.xml

  elasticsearch:
    image: elasticsearch:8.13.0
    ports: ["9200:9200"]
    environment:
      discovery.type:        single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS:          "-Xms512m -Xmx512m"
    volumes: [es-data:/usr/share/elasticsearch/data]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      retries: 5

  vault:
    image: hashicorp/vault:1.16
    ports: ["8200:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID:  ${VAULT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: vault server -dev
    cap_add: [IPC_LOCK]

  # ── Gateways ───────────────────────────────────────────────────────
  api-gateway:
    build: ../apps/api-gateway
    ports: ["8080:8080"]
    depends_on: [redis]
    environment:
      NODE_ENV:                  production
      JWT_SECRET:                ${JWT_SECRET}
      CLIENT_ORIGIN:             ${CLIENT_ORIGIN:-*}
      AUTH_SERVICE_URL:          http://auth-service:3001
      RIDE_SERVICE_URL:          http://ride-service:3002
      DELIVERY_SERVICE_URL:      http://delivery-service:3003
      PAYMENT_SERVICE_URL:       http://payment-service:3004
      LOCATION_SERVICE_URL:      http://location-service:3005
      FREIGHT_SERVICE_URL:       http://freight-service:3007
      INTERCITY_SERVICE_URL:     http://intercity-service:3008
      MARKETPLACE_SERVICE_URL:   http://marketplace-service:3009
      FOOD_SERVICE_URL:          http://food-service:3011
      INTERDISTRICT_SERVICE_URL: http://interdistrict-service:3012
      ANALYTICS_SERVICE_URL:     http://analytics-service:3013
      SEARCH_SERVICE_URL:        http://search-service:3014
      MATCHING_SERVICE_URL:      http://matching-service:3015
      REWARD_SERVICE_URL:        http://reward-service:3016
      WS_GATEWAY_URL:            http://ws-gateway:3010
      ML_SERVICE_URL:            http://ml-service:8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 15s

  ws-gateway:
    build: ../apps/ws-gateway
    ports: ["3010:3010"]
    depends_on: [redis]
    environment:
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-*}
      JWT_SECRET:    ${JWT_SECRET}

  ml-service:
    build: ../apps/ml-service
    ports: ["8000:8000"]
    environment:
      ENV: production

  # ── Backend Services ───────────────────────────────────────────────
  auth-service:
    build: ../services/auth-service
    ports: ["3001:3001"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      JWT_SECRET:                ${JWT_SECRET}
      ESKIZ_EMAIL:               ${ESKIZ_EMAIL}
      ESKIZ_PASSWORD:            ${ESKIZ_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 15s

  ride-service:
    build: ../services/ride-service
    ports: ["3002:3002"]
    depends_on: [redis, kafka]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_HOST:                redis
      KAFKA_BROKERS:             kafka:9092
      MATCHING_SERVICE_URL:      http://matching-service:3015

  delivery-service:
    build: ../services/delivery-service
    ports: ["3003:3003"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  payment-service:
    build: ../services/payment-service
    ports: ["3004:3004"]
    depends_on: [kafka]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      PAYME_MERCHANT_ID:         ${PAYME_MERCHANT_ID}
      PAYME_SECRET_KEY:          ${PAYME_SECRET_KEY}
      CLICK_SERVICE_ID:          ${CLICK_SERVICE_ID}
      CLICK_SECRET_KEY:          ${CLICK_SECRET_KEY}
      KAFKA_BROKERS:             kafka:9092

  location-service:
    build: ../services/location-service
    ports: ["3005:3005"]
    depends_on: [redis, kafka]
    environment:
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      KAFKA_BROKERS: kafka:9092

  notification-service:
    build: ../services/notification-service
    ports: ["3006:3006"]
    depends_on: [redis]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      FCM_SERVER_KEY:            ${FCM_SERVER_KEY}
      ESKIZ_EMAIL:               ${ESKIZ_EMAIL}
      ESKIZ_PASSWORD:            ${ESKIZ_PASSWORD}
      SMTP_HOST:                 ${SMTP_HOST}
      SMTP_USER:                 ${SMTP_USER}
      SMTP_PASS:                 ${SMTP_PASS}
      REDIS_HOST:                redis

  freight-service:
    build: ../services/freight-service
    ports: ["3007:3007"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      LOCATION_SERVICE_URL:      http://location-service:3005

  intercity-service:
    build: ../services/intercity-service
    ports: ["3008:3008"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  marketplace-service:
    build: ../services/marketplace-service
    ports: ["3009:3009"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  food-service:
    build: ../services/food-service
    ports: ["3011:3011"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  interdistrict-service:
    build: ../services/interdistrict-service
    ports: ["3012:3012"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  analytics-service:
    build: ../services/analytics-service
    ports: ["3013:3013"]
    depends_on: [clickhouse, kafka]
    environment:
      CLICKHOUSE_URL:      http://clickhouse:8123
      CLICKHOUSE_DB:       unigo
      KAFKA_BROKERS:       kafka:9092

  search-service:
    build: ../services/search-service
    ports: ["3014:3014"]
    depends_on:
      elasticsearch: { condition: service_healthy }
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200

  matching-service:
    build: ../services/matching-service
    ports: ["3015:3015"]
    depends_on: [redis, kafka]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_HOST:                redis
      REDIS_PORT:                6379
      KAFKA_BROKERS:             kafka:9092
      ML_SERVICE_URL:            http://ml-service:8000

  reward-service:
    build: ../services/reward-service
    ports: ["3016:3016"]
    depends_on: [redis]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_HOST:                redis

  # ── Observability ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards

  kibana:
    image: kibana:8.13.0
    ports: ["5601:5601"]
    depends_on:
      elasticsearch: { condition: service_healthy }
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "6831:6831/udp"

# ── Volumes ────────────────────────────────────────────────────────
volumes:
  redis-data:
  postgres-data:
  kafka-data:
  clickhouse-data:
  es-data:
  prometheus-data:
  grafana-data:

  routing-service:
    build: ../services/routing-service
    ports: ["3017:3017"]
    depends_on: [redis]
    environment:
      OSRM_URL:                  ${OSRM_URL:-http://router.project-osrm.org}
      REDIS_HOST:                redis
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  corporate-service:
    build: ../services/corporate-service
    ports: ["3018:3018"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  safety-service:
    build: ../services/safety-service
    ports: ["3019:3019"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NOTIFICATION_SERVICE_URL:  http://notification-service:3006

  subscription-service:
    build: ../services/subscription-service
    ports: ["3020:3020"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  verification-service:
    build: ../services/verification-service
    ports: ["3021:3021"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NOTIFICATION_SERVICE_URL:  http://notification-service:3006

  promo-service:
    build: ../services/promo-service
    ports: ["3022:3022"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  chat-service:
    build: ../services/chat-service
    ports: ["3023:3023"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      WS_GATEWAY_URL:            http://ws-gateway:3010

  wallet-service:
    build: ../services/wallet-service
    ports: ["3024:3024"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  earnings-service:
    build: ../services/earnings-service
    ports: ["3025:3025"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      WALLET_SERVICE_URL:        http://wallet-service:3024

  ab-testing-service:
    build: ../services/ab-testing-service
    ports: ["3026:3026"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  privacy-service:
    build: ../services/privacy-service
    ports: ["3027:3027"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NOTIFICATION_SERVICE_URL:  http://notification-service:3006

  graphql-gateway:
    build: ../apps/graphql-gateway
    ports: ["4000:4000"]
    environment:
      JWT_SECRET:                ${JWT_SECRET}
      RIDE_SERVICE_URL:          http://ride-service:3002
      AUTH_SERVICE_URL:          http://auth-service:3001
      LOCATION_SERVICE_URL:      http://location-service:3005
      ML_SERVICE_URL:            http://ml-service:8000
      CHAT_SERVICE_URL:          http://chat-service:3023
      WALLET_SERVICE_URL:        http://wallet-service:3024
      EARNINGS_SERVICE_URL:      http://earnings-service:3025
      SAFETY_SERVICE_URL:        http://safety-service:3019
      SEARCH_SERVICE_URL:        http://search-service:3014

  voice-service:
    build: ../services/voice-service
    ports: ["3028:3028"]
    environment:
      ML_SERVICE_URL:            http://ml-service:8000
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  sdui-service:
    build: ../services/sdui-service
    ports: ["3029:3029"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  feature-store-service:
    build: ../services/feature-store-service
    ports: ["3030:3030"]
    depends_on: [redis]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_HOST:                redis

  support-service:
    build: ../services/support-service
    ports: ["3031:3031"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NOTIFICATION_SERVICE_URL:  http://notification-service:3006

  fleet-service:
    build: ../services/fleet-service
    ports: ["3032:3032"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  rating-service:
    build: ../services/rating-service
    ports: ["3033:3033"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  report-service:
    build: ../services/report-service
    ports: ["3034:3034"]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

  config-service:
    build: ../services/config-service
    ports: ["3035:3035"]
    depends_on: [redis]
    environment:
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_HOST:                redis
