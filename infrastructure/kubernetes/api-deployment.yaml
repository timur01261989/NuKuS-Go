apiVersion: apps/v1
kind: Deployment
metadata:
  name: unigo-api
  labels:
    app: unigo-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: unigo-api
  template:
    metadata:
      labels:
        app: unigo-api
    spec:
      containers:
        - name: api
          image: unigo/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: unigo-api-secrets
                  key: redis-url
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: unigo-api-secrets
                  key: supabase-url
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: unigo-api-secrets
                  key: supabase-service-role-key
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: unigo-api
spec:
  selector:
    app: unigo-api
  ports:
    - name: http
      port: 80
      targetPort: http
