apiVersion: apps/v1
kind: Deployment
metadata:
  name: unigo-workers
  labels:
    app: unigo-workers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: unigo-workers
  template:
    metadata:
      labels:
        app: unigo-workers
    spec:
      containers:
        - name: worker
          image: unigo/worker:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "backend/src/worker.js"]
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: unigo-worker-secrets
                  key: redis-url
            - name: PY_AI_URL
              valueFrom:
                configMapKeyRef:
                  name: unigo-runtime-config
                  key: py-ai-url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
