global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "unigo-api"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["api:3000"]
        labels:
          service: "api"

  - job_name: "unigo-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:3000"]
        labels:
          service: "worker"

  - job_name: "unigo-python-ai"
    metrics_path: /metrics
    static_configs:
      - targets: ["python-ai:8000"]
        labels:
          service: "python-ai"

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"
