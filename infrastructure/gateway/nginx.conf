# UniGo API Gateway — Nginx Configuration
# Optimized for: Brotli, TLS 1.3 0-RTT, HTTP/3 (QUIC)

worker_processes      auto;
worker_rlimit_nofile  65535;

events {
  worker_connections 65535;
  multi_accept       on;
  use                epoll;
}

http {
  # ── Compression ─────────────────────────────────────────────────────────────
  brotli            on;
  brotli_comp_level 6;
  brotli_types      application/json application/javascript text/css
                    application/protobuf application/octet-stream;

  gzip              on;
  gzip_comp_level   5;
  gzip_types        application/json text/plain;

  # ── Connection Tuning ────────────────────────────────────────────────────────
  keepalive_timeout    75s;
  keepalive_requests   10000;
  tcp_nopush           on;
  tcp_nodelay          on;
  sendfile             on;

  # ── Rate Limiting ────────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=200r/m;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=30r/m;

  # ── Upstream Services ────────────────────────────────────────────────────────
  upstream api_backend {
    least_conn;
    server api-gateway:8080 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 100;
  }

  upstream ws_backend {
    ip_hash;  # Sticky sessions for WebSocket
    server ws-gateway:3010 weight=1;
    keepalive 50;
  }

  upstream graphql_backend {
    server graphql-gateway:4000 weight=1;
    keepalive 50;
  }

  # ── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
  server {
    listen 80;
    server_name api.unigo.uz ws.unigo.uz admin.unigo.uz;
    return 301 https://$host$request_uri;
  }

  # ── Main API Server ──────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen 443 quic reuseport;  # HTTP/3 + QUIC
    server_name api.unigo.uz;

    # TLS 1.3 only + 0-RTT
    ssl_certificate     /etc/ssl/unigo/fullchain.pem;
    ssl_certificate_key /etc/ssl/unigo/privkey.pem;
    ssl_protocols       TLSv1.3;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_early_data      on;    # 0-RTT: reduces latency by 1 round-trip

    # HTTP/3 advertisement
    add_header Alt-Svc 'h3=":443"; ma=86400';
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'";
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()";

    location /api/ {
      limit_req  zone=api_limit  burst=50 nodelay;
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Early-Data $ssl_early_data;
      proxy_connect_timeout  5s;
      proxy_read_timeout    30s;
    }

    location /api/v1/auth/ {
      limit_req  zone=auth_limit burst=5 nodelay;
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
      proxy_pass http://ws_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;    # WebSocket long connection
      proxy_send_timeout 3600s;
    }

    location /graphql {
      proxy_pass http://graphql_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # Health check (no rate limit)
    location /api/health {
      proxy_pass http://api_backend;
      access_log off;
    }
  }
}
